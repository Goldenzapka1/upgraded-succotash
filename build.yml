name: Build Python Executable

on:
  push:
    branches: [ "main" ] # Runs when you push to the main branch
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest # Required to build a Windows .exe file

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Change to your Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build .exe with PyInstaller
      run: |
        pyinstaller --onefile main.py
        # Replace 'main.py' with your script's actual filename
        # Add '--noconsole' if your app has a GUI (like Tkinter/PyQt)

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-executable
        path: dist/*.exe
